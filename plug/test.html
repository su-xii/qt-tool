<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<button onclick="downloadFile()">点击下载</button>
<button onclick="downloadZipFileAdvanced()">点击下载2</button>
</body>

<script>
  function downloadFile() {
    // 创建 Blob 对象，内容为 helloworld
    const blob = new Blob(['helloworld'], { type: 'text/plain' });

    // 创建临时下载链接
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'hello.txt'; // 下载的文件名

    // 触发点击
    document.body.appendChild(a);
    a.click();

    // 清理
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  /**
   * 增强版下载函数 - 支持错误处理和加载状态
   */
  async function downloadZipFileAdvanced(relativePath = '', options = {}) {
      const {
          onStart = () => console.log('开始下载...'),
          onSuccess = () => console.log('下载完成'),
          onError = (err) => console.error('下载出错:', err),
          showProgress = false
      } = options;

      try {
          onStart();

          const fileName = '../../test/test2.zip';
          const fullPath = relativePath ? `${relativePath}/${fileName}` : fileName;

          // 检查文件是否存在（可选）
          const response = await fetch(fullPath, { method: 'HEAD' });
          if (!response.ok) {
              throw new Error(`文件不存在或无法访问: ${response.status}`);
          }

          // 创建隐藏的下载链接
          const link = document.createElement('a');
          link.href = fullPath;
          link.download = fileName;
          link.style.display = 'none';

          document.body.appendChild(link);

          // 如果需要显示进度
          if (showProgress) {
              link.addEventListener('click', () => {
                  console.log('下载已启动...');
              });
          }

          link.click();
          document.body.removeChild(link);

          onSuccess();
          return true;

      } catch (error) {
          onError(error);
          return false;
      }
  }
</script>
</html>

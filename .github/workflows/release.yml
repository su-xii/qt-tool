name: Build and Release

# === 关键：赋予工作流写入权限 ===
permissions:
  contents: write

on:
  workflow_dispatch: {}
  push:
    tags:
      - 'v*'

jobs:
  # ==========================
  # 1. 构建 Job (矩阵并行)
  # ==========================
  build:
    name: ${{ matrix.build }}-build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        build: [linux, macos, windows]
        include:
          - build: linux
            os: ubuntu-latest
            rust: nightly
            target: x86_64-unknown-linux-musl
            archive-name: qt-linux.tar.gz
          - build: macos
            os: macos-latest
            rust: nightly
            target: x86_64-apple-darwin
            archive-name: qt-macos.tar.gz
          - build: windows
            os: windows-latest
            rust: nightly-x86_64-msvc
            target: x86_64-pc-windows-msvc
            archive-name: qt-windows.tar.gz
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 仅在 Linux 环境下安装 musl 工具链
      - name: Install Musl Tools (Linux)
        if: matrix.build == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools musl-dev
          
          # 验证安装
          x86_64-linux-musl-gcc --version

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: ${{ matrix.rust }}
          profile: minimal
          override: true
          target: ${{ matrix.target }}

      - name: Build
        run: cargo build --verbose --release --target ${{ matrix.target }}

      - name: Strip (Linux/Mac)
        if: matrix.build == 'linux' || matrix.build == 'macos'
        run: strip "target/${{ matrix.target }}/release/qt"

      - name: Package
        shell: bash
        run: |
          mkdir archive
          cd archive
          if [ "${{ matrix.build }}" = "windows" ]; then
            cp "../target/${{ matrix.target }}/release/qt.exe" ./
            tar -czf "${{ matrix.archive-name }}" qt.exe
          else
            cp "../target/${{ matrix.target }}/release/qt" ./
            tar -czf "${{ matrix.archive-name }}" qt
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive-name }}
          path: archive/${{ matrix.archive-name }}
          # 可选：保留期限，默认90天
          retention-days: 5
  
  # ==========================
  # 2. 发布 Job (串行，依赖构建完成)
  # ==========================
  release:
    name: Create Release
    needs: build  # 关键：等待所有 build 任务完成
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 步骤 A: 下载所有构建产物
      # download-artifact v4 会将每个 artifact 下载到以 artifact name 命名的文件夹中
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: downloaded_artifacts
          # 如果不指定 pattern，默认下载当前 workflow 运行产生的所有 artifact
          # 如果需要精确匹配，可以使用 pattern: 'qt-*'

      # 调试：查看下载后的文件结构 (可选，失败时很有用)
      - name: List downloaded files
        run: ls -R downloaded_artifacts

      # 步骤 B: 上传到 GitHub Release
      - name: Upload to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          # 指定要上传的文件路径
          # 这里使用通配符匹配所有下载下来的压缩包
          files: downloaded_artifacts/**/*.tar.gz
          
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

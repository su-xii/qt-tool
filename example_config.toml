[server]
# 服务器配置
addr = "127.0.0.1:9999"
# 后续补充日志相关配置


# ================================================================
# output 配置块
# ------------------------------------------------
# 每个 [[output]] 定义一组 ZIP 解压 → 输出目录映射规则
#
# ⚠️ 非常重要：
#     新增规则必须追加在末尾
#     禁止中间插入或调整顺序
#
# 原因：
#     当前系统历史记录依赖 output 在数组中的索引
#     改顺序会导致历史数据错位
#
# 未来改进：
#     计划引入 key-based 标识替代索引
# ================================================================


[[output]]
# ---------------- 基本信息 ----------------
# 规则名称，仅用于日志与显示
name = "测试codesign 安卓"
# 描述信息，人类阅读用
description = "测试codesign功能是否正常"
# ---------------- 输出路径控制 ----------------
# 输出根目录
# ./test 与 ./test/ 等价
base_path = "test"
# format 决定最终写入路径结构
#
# 输出路径计算方式：
#     base_path / format[i] / <文件名>
#
# 例如：
#     test/v1/name.png
#     test/v2/name.png
#     test/v3/name.png
#
# ⚠️ 顺序必须与 zip_format 完全一致
format = ["v1","v2","v3"]


# ---------------- ZIP 匹配规则 ----------------
# 描述 ZIP 内部结构
#
# 目录模式（以 "/" 结尾）
#     mipmap-mdpi/
#
# 表示：
#     在 ZIP 中查找任意位于该目录下的文件
#
# 可匹配：
#     mipmap-mdpi/icon.png
#     a/b/mipmap-mdpi/icon.png
#
# 不匹配：
#     mipmap-mdpi.png
#
zip_format = [
    "mipmap-mdpi/",
    "mipmap-hdpi/",
    "mipmap-xhdpi/"
]


# ---------------- 输出文件类型限制 ----------------
# 允许写入磁盘的扩展名白名单
#
# 用途：
#     防止 ZIP 注入恶意文件
#
format_limit = [".png",".svg"]



# ================================================================
# WEB 示例
# ================================================================

[[output]]
name = "测试codesign WEB"
description = "测试codesign功能是否正常"
base_path = "test"

# 输出目录
format = ["web-v1","web-v2"]

# ZIP 同级匹配模式
#
# ./     表示匹配 ZIP 根目录
# **     表示文件名通配
#
# ⚠️ 实际匹配按后缀长度降序执行
#     避免 .png 抢匹配
#
zip_format = ["./**.png","./**@2x.png"]

# 限制输出类型
format_limit = [".png",".svg"]



# ================================================================
# IOS 示例
# ================================================================

[[output]]
name = "测试codesign IOS"
description = "测试codesign功能是否正常"
base_path = "test"
format = ["ios-v1","ios-v2","ios-v3"]
# 多倍图匹配
#
# 匹配：
#     name.png
#     name@2x.png
#     name@3x.png
#
zip_format = [
    "./**.png",
    "./**@2x.png",
    "./**@3x.png"
]

format_limit = [".png",".svg"]



# ================================================================
# 通用模板示例 — 目录映射模式
# ================================================================
[[output]]
# 输出类型名称
name = "输出目录的名字，例如：安卓，IOS，flutter"
# 描述
description = "输出目录描述"
# 输出根路径
base_path = "文件路径，例如：./ui"
# format 是相对 base_path 的路径
#
# 示例：
#     name.png
#     v2/name.png
#     v3/name.png
#
format = [".","v2/","v3/"]
# ZIP 中的精确文件匹配
#
# 适用于结构固定的压缩包
#
zip_format = ["1.png","2.png","3.png"]
# 输出类型限制
format_limit = [".png",".svg"]



# ================================================================
# 通用模板示例 — 同级通配模式
# ================================================================
[[output]]
name = "输出目录的名字，例如：安卓，IOS，flutter"
description = "输出目录描述"
base_path = "文件路径，例如：./ui"
# format 为输出目标路径
format = ["1","2","3"]
# 同级通配匹配
#
# ** 表示文件名
#
# 支持：
#     icon.png
#     icon@2x.png
#     icon@3x.png
#
zip_format = [
    "./**.png",
    "./**@2x.png",
    "./**@3x.png"
]

format_limit = [".png",".svg"]

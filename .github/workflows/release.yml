name: Build and Release

permissions:
  contents: write

on:
  workflow_dispatch: {}
  push:
    tags:
      - "v*"

jobs:
  build:
    name: ${{ matrix.build }}-build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        build: [linux, macos, windows]
        include:
          - build: linux
            os: ubuntu-latest
            rust: nightly
            target: x86_64-unknown-linux-musl
            archive-name: qt-linux.tar.gz
            node-version: "22"
          - build: macos
            os: macos-latest
            rust: nightly
            target: x86_64-apple-darwin
            archive-name: qt-macos.tar.gz
            node-version: "22"
          - build: windows
            os: windows-latest
            rust: nightly-x86_64-msvc
            target: x86_64-pc-windows-msvc
            archive-name: qt-windows.tar.gz
            node-version: "22"
      fail-fast: false

    steps:
      # 1. 检出代码
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive
          fetch-depth: 0

      # ==========================
      # 2. 构建前端 (NPM)
      # ==========================
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          # 【重要修复】完全禁用缓存功能，避免因缺少 lock 文件导致路径解析错误
          # 不再设置 cache 和 cache-dependency-path

      - name: Install Frontend Dependencies & Build
        working-directory: plug/codesign-qt-helper
        run: |
          echo "📦 Running npm i..."
          npm i
          
          echo "🏗️ Running npm run build..."
          npm run build
          
          echo "✅ Frontend build completed."

      # ==========================
      # 3. 准备 Rust 环境
      # ==========================
      - name: Install Musl Tools (Linux Only)
        if: matrix.build == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools musl-dev cmake perl
          x86_64-linux-musl-gcc --version

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: ${{ matrix.rust }}
          profile: minimal
          override: true
          target: ${{ matrix.target }}

      # ==========================
      # 4. 构建 Rust 后端
      # ==========================
      - name: Build Rust Backend
        run: cargo build --verbose --release --target ${{ matrix.target }}

      - name: Strip Binary (Linux/Mac)
        if: matrix.build == 'linux' || matrix.build == 'macos'
        run: strip "target/${{ matrix.target }}/release/qt"

      # ==========================
      # 5. 打包归档 (Package)
      # ==========================
      - name: Package Artifacts
        shell: bash
        run: |
          mkdir -p archive
          cd archive

          if [ "${{ matrix.build }}" = "windows" ]; then
            BINARY="qt.exe"
            SCRIPT_NAME="run.bat"
            cp "../target/${{ matrix.target }}/release/qt.exe" "./$BINARY"
          else
            BINARY="qt"
            SCRIPT_NAME="run.sh"
            cp "../target/${{ matrix.target }}/release/qt" "./$BINARY"
            chmod +x "$BINARY"
          fi
          
          cp "../$SCRIPT_NAME" "./$SCRIPT_NAME"
          if [ "${{ matrix.build }}" != "windows" ]; then
            chmod +x "./$SCRIPT_NAME"
          fi

          if [ -f "../config.toml" ]; then
            cp ../config.toml ./
          else
            touch config.toml
          fi
          
          if [ -f "../README.md" ]; then
            cp ../README.md ./
          fi

          if [ -d "../plug/codesign-qt-helper/dist" ]; then
            cp -r ../plug/codesign-qt-helper/dist ./dist
            echo "✅ Copied frontend assets"
          else
            echo "❌ Error: Frontend dist directory not found!"
            exit 1
          fi

          echo "📦 Creating archive: ${{ matrix.archive-name }}"
          tar -czf "${{ matrix.archive-name }}" "$BINARY" "$SCRIPT_NAME" config.toml README.md dist

          echo "✅ Archive created successfully."
          ls -lh

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive-name }}
          path: archive/${{ matrix.archive-name }}
          retention-days: 5

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: downloaded_artifacts

      - name: List downloaded files
        run: ls -R downloaded_artifacts

      - name: Upload to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: downloaded_artifacts/**/*.tar.gz
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
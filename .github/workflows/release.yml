name: Build and Release

permissions:
  contents: write

on:
  workflow_dispatch: {}
  push:
    tags:
      - "v*"

jobs:
  build:
    name: ${{ matrix.build }}-build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        build: [linux, macos, windows]
        include:
          - build: linux
            os: ubuntu-latest
            rust: nightly
            target: x86_64-unknown-linux-musl
            archive-name: qt-linux.tar.gz
            node-version: "20"
          - build: macos
            os: macos-latest
            rust: nightly
            target: x86_64-apple-darwin
            archive-name: qt-macos.tar.gz
            node-version: "20"
          - build: windows
            os: windows-latest
            rust: nightly-x86_64-msvc
            target: x86_64-pc-windows-msvc
            archive-name: qt-windows.tar.gz
            node-version: "20"
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ==========================
      # 1. 构建前端 (NPM)
      # ==========================
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
          # 指定缓存依赖的目录，确保缓存命中
          cache-dependency-path: plug/codesign-qt-helper/package-lock.json

      - name: Install Frontend Dependencies & Build
        working-directory: plug/codesign-qt-helper
        run: |
          npm ci
          npm run build
          echo "✅ Frontend build completed."
          ls -la dist  # 验证 dist 目录已生成

      # ==========================
      # 2. 准备 Rust 环境
      # ==========================
      - name: Install Musl Tools (Linux Only)
        if: matrix.build == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools musl-dev cmake perl
          x86_64-linux-musl-gcc --version

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: ${{ matrix.rust }}
          profile: minimal
          override: true
          target: ${{ matrix.target }}

      # ==========================
      # 3. 构建 Rust 后端
      # ==========================
      - name: Build Rust Backend
        run: cargo build --verbose --release --target ${{ matrix.target }}

      - name: Strip Binary (Linux/Mac)
        if: matrix.build == 'linux' || matrix.build == 'macos'
        run: strip "target/${{ matrix.target }}/release/qt"

      # ==========================
      # 4. 打包归档 (Package)
      # ==========================
      - name: Package Artifacts
        shell: bash
        run: |
          mkdir -p archive
          cd archive

          # 定义二进制文件名和启动脚本
          if [ "${{ matrix.build }}" = "windows" ]; then
            BINARY="qt.exe"
            SHELL="run.bat"
            cp "../target/${{ matrix.target }}/release/qt.exe" "./$BINARY"
            cp "../$SHELL" ./
          else
            BINARY="qt"
            SHELL="run.sh"
            cp "../target/${{ matrix.target }}/release/qt" "./$BINARY"
            cp "../$SHELL" ./
          fi

          # 复制配置文件和文档
          cp ../config.toml ./
          cp ../README.md ./

          # 复制前端构建产物
          # 源路径: plug/codesign-qt-helper/dist
          # 目标路径: ./dist
          if [ -d "../plug/codesign-qt-helper/dist" ]; then
            cp -r ../plug/codesign-qt-helper/dist ./dist
            echo "✅ Copied frontend assets from plug/codesign-qt-helper/dist"
          else
            echo "❌ Error: Frontend dist directory not found!"
            exit 1
          fi

          # 创建压缩包
          echo "📦 Creating archive: ${{ matrix.archive-name }}"
          tar -czf "${{ matrix.archive-name }}" "$BINARY" "SHELL" config.toml README.md dist

          echo "✅ Archive created successfully."
          ls -lh

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive-name }}
          path: archive/${{ matrix.archive-name }}
          retention-days: 5

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: downloaded_artifacts

      - name: List downloaded files
        run: ls -R downloaded_artifacts

      - name: Upload to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: downloaded_artifacts/**/*.tar.gz
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
